<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, createContext, useContext } = React;

/* ------------------------------------------------------------------ */
/*  Recipe Storage — GitHub Pages edition                              */
/*  100% free: recipes persist in the browser's localStorage, and the  */
/*  search tab uses the bundled recipes-db.json plus TheMealDB (a      */
/*  free, no-account recipe API). No AI usage anywhere.                */
/* ------------------------------------------------------------------ */

const MEALS = ["Breakfast", "Lunch", "Dinner"];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* ---------- localStorage persistence ---------- */
const store = {
  listKeys(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) keys.push(k);
    }
    return keys;
  },
  get(key) {
    return localStorage.getItem(key);
  },
  set(key, value) {
    try { localStorage.setItem(key, value); return true; }
    catch (e) { return false; } // quota exceeded
  },
  remove(key) {
    localStorage.removeItem(key);
  },
};

function loadRecipes() {
  const out = [];
  for (const k of store.listKeys("recipe:")) {
    try {
      const v = store.get(k);
      if (v) out.push(JSON.parse(v));
    } catch (e) { /* skip broken entry */ }
  }
  out.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  return out;
}
function saveRecipe(recipe) {
  return store.set("recipe:" + recipe.id, JSON.stringify(recipe));
}
function removeRecipe(id) {
  store.remove("recipe:" + id);
}
function loadSettings() {
  try {
    const v = store.get("app-settings");
    return v ? JSON.parse(v) : null;
  } catch (e) { return null; }
}
function saveSettings(s) {
  return store.set("app-settings", JSON.stringify(s));
}

/* ---------- color math for themes ---------- */
function hexToRgb(hex) {
  const h = hex.replace("#", "");
  const v = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
  return [parseInt(v.slice(0, 2), 16), parseInt(v.slice(2, 4), 16), parseInt(v.slice(4, 6), 16)];
}
function rgbToHex(rgb) {
  return "#" + rgb.map((v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0")).join("");
}
function luminance(hex) {
  const [r, g, b] = hexToRgb(hex).map((v) => v / 255);
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}
function mix(hexA, hexB, t) {
  const a = hexToRgb(hexA), b = hexToRgb(hexB);
  return rgbToHex(a.map((v, i) => v + (b[i] - v) * t));
}

/* ---------- theme definitions ---------- */
const LIGHT = {
  bg: "#EEF1EA", ink: "#26382B", inkSoft: "#5A6B5D", card: "#FFFDF8",
  line: "#D8DDD2", accent: "#C4452C", star: "#E9B44C", starEdge: "#B8860B",
  tabColors: { Breakfast: "#E9B44C", Lunch: "#7E9271", Dinner: "#C4452C" },
  onAccent: "#FFFFFF", overlayTint: null, bgImage: null,
};
const DARK = {
  bg: "#1C221D", ink: "#F1EFE5", inkSoft: "#A7B2A5", card: "#2A332B",
  line: "#3E483F", accent: "#E06248", star: "#E9B44C", starEdge: "#E9B44C",
  tabColors: { Breakfast: "#E9B44C", Lunch: "#8FA382", Dinner: "#E06248" },
  onAccent: "#FFFFFF", overlayTint: null, bgImage: null,
};
function buildCustomTheme(base, accent, bgImage) {
  const darkBase = luminance(base) < 0.45;
  const ink = darkBase ? mix(base, "#FFFFFF", 0.92) : mix(base, "#000000", 0.82);
  const card = darkBase ? mix(base, "#FFFFFF", 0.09) : mix(base, "#FFFFFF", 0.65);
  const accentIsLight = luminance(accent) > 0.6;
  return {
    bg: base, ink,
    inkSoft: mix(ink, base, 0.35),
    card,
    line: mix(base, ink, 0.22),
    accent, star: accent, starEdge: mix(accent, ink, 0.35),
    tabColors: { Breakfast: mix(accent, base, 0.25), Lunch: mix(accent, base, 0.45), Dinner: accent },
    onAccent: accentIsLight ? "#1A1A1A" : "#FFFFFF",
    overlayTint: bgImage ? (darkBase ? "rgba(0,0,0,.45)" : "rgba(255,255,255,.55)") : null,
    bgImage: bgImage || null,
  };
}

const ThemeCtx = createContext(LIGHT);
const useTheme = () => useContext(ThemeCtx);

/* ---------- image compression (keeps localStorage small) ---------- */
function fileToCompressedDataUrl(file, maxDim = 900, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("read failed"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("image decode failed"));
      img.onload = () => {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------- free recipe search: bundled DB + TheMealDB ---------- */
let localDbCache = null;
async function getLocalDb() {
  if (localDbCache) return localDbCache;
  try {
    const res = await fetch("recipes-db.json");
    const data = await res.json();
    localDbCache = Array.isArray(data) ? data : [];
  } catch (e) {
    localDbCache = [];
  }
  return localDbCache;
}

function searchLocalDb(db, q) {
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  return db
    .map((r) => {
      const hay = (r.name + " " + (r.description || "") + " " + (r.ingredients || []).join(" ")).toLowerCase();
      const nameHay = r.name.toLowerCase();
      let score = 0;
      for (const t of terms) {
        if (nameHay.includes(t)) score += 3;
        else if (hay.includes(t)) score += 1;
      }
      return { r, score };
    })
    .filter((x) => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5)
    .map((x) => ({ ...x.r, source: "Built-in" }));
}

function mealDbToRecipe(meal) {
  const ingredients = [];
  for (let i = 1; i <= 20; i++) {
    const ing = meal["strIngredient" + i];
    const measure = meal["strMeasure" + i];
    if (ing && ing.trim()) {
      ingredients.push(((measure || "").trim() + " " + ing.trim()).trim());
    }
  }
  const steps = (meal.strInstructions || "")
    .split(/\r?\n+/)
    .map((s) => s.replace(/^STEP \d+[:.]?\s*/i, "").replace(/^\d+[.)]\s*/, "").trim())
    .filter((s) => s.length > 3);
  const cat = (meal.strCategory || "").toLowerCase();
  const type = cat === "breakfast" ? "Breakfast" : "";
  const descBits = [meal.strArea, meal.strCategory].filter(Boolean);
  return {
    name: meal.strMeal,
    type,
    description: descBits.length ? descBits.join(" · ") : "",
    ingredients,
    steps: steps.length ? steps : [meal.strInstructions || ""].filter(Boolean),
    image: meal.strMealThumb ? meal.strMealThumb + "/preview" : null,
    source: "TheMealDB",
  };
}

async function searchMealDb(q) {
  try {
    const res = await fetch("https://www.themealdb.com/api/json/v1/1/search.php?s=" + encodeURIComponent(q));
    const data = await res.json();
    if (!data.meals) return [];
    return data.meals.slice(0, 6).map(mealDbToRecipe);
  } catch (e) {
    return null; // network failure — distinguish from "no results"
  }
}

/* ---------- tiny UI atoms ---------- */
function Star({ filled, onClick, size = 22 }) {
  const T = useTheme();
  return (
    <button
      onClick={(e) => { e.stopPropagation(); onClick(); }}
      aria-label={filled ? "Remove from favorites" : "Add to favorites"}
      style={{ background: "none", border: "none", cursor: "pointer", padding: 4, lineHeight: 0 }}
    >
      <svg width={size} height={size} viewBox="0 0 24 24">
        <path
          d="M12 2.5l2.9 6.1 6.6.9-4.8 4.7 1.2 6.6L12 17.7l-5.9 3.1 1.2-6.6L2.5 9.5l6.6-.9L12 2.5z"
          fill={filled ? T.star : "none"}
          stroke={filled ? T.starEdge : T.inkSoft}
          strokeWidth="1.6"
          strokeLinejoin="round"
        />
      </svg>
    </button>
  );
}

function BackButton({ onClick, label = "Back" }) {
  const T = useTheme();
  return (
    <button
      onClick={onClick}
      style={{
        position: "fixed", left: 20, bottom: 20, zIndex: 40,
        display: "flex", alignItems: "center", gap: 8,
        padding: "10px 18px 10px 14px", borderRadius: 999,
        border: "1.5px solid " + T.ink, background: T.card, color: T.ink,
        fontSize: 14, fontWeight: 600, cursor: "pointer",
        boxShadow: "0 2px 8px rgba(0,0,0,0.2)",
      }}
    >
      <span aria-hidden="true" style={{ fontSize: 16 }}>←</span> {label}
    </button>
  );
}

function GearButton({ onClick }) {
  return (
    <button
      onClick={onClick}
      aria-label="Settings"
      title="Settings"
      style={{ background: "none", border: "none", cursor: "pointer", padding: 6, lineHeight: 0, color: "inherit" }}
    >
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="3.2" />
        <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.56-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.01A1.7 1.7 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56h.01a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.01A1.7 1.7 0 0 0 20.91 10H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1z" />
      </svg>
    </button>
  );
}

const smallBtnStyle = (T) => ({
  padding: "9px 16px", borderRadius: 999, border: "1.5px solid " + T.line,
  background: T.card, color: T.ink, fontSize: 14, fontWeight: 600, cursor: "pointer",
});

/* ---------- main app ---------- */
function RecipeStorage() {
  const [view, setView] = useState("home"); // home | recipes | favorites | settings
  const [tab, setTab] = useState("Breakfast");
  const [recipes, setRecipes] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [openRecipe, setOpenRecipe] = useState(null);
  const [notice, setNotice] = useState("");
  const [settings, setSettings] = useState({
    theme: "light",
    customBase: "#EEF1EA",
    customAccent: "#C4452C",
    customBgImage: null,
  });

  useEffect(() => {
    setRecipes(loadRecipes());
    const s = loadSettings();
    if (s) setSettings((prev) => ({ ...prev, ...s }));
  }, []);

  const T =
    settings.theme === "dark" ? DARK :
    settings.theme === "custom" ? buildCustomTheme(settings.customBase, settings.customAccent, settings.customBgImage) :
    LIGHT;

  const flash = (msg) => {
    setNotice(msg);
    setTimeout(() => setNotice(""), 2600);
  };

  const updateSettings = (patch) => {
    const next = { ...settings, ...patch };
    setSettings(next);
    if (!saveSettings(next)) flash("Theme applied, but couldn't be saved — browser storage is full.");
  };

  const addRecipe = (recipe) => {
    setRecipes((prev) => [recipe, ...prev]);
    setShowForm(false);
    const ok = saveRecipe(recipe);
    flash(ok ? "Saved \u201C" + recipe.name + "\u201D" : "Added, but couldn't be saved — browser storage is full. Try removing the photo.");
  };

  const toggleFavorite = (id) => {
    let updated;
    setRecipes((prev) =>
      prev.map((r) => {
        if (r.id !== id) return r;
        updated = { ...r, favorite: !r.favorite };
        return updated;
      })
    );
    if (openRecipe && openRecipe.id === id) setOpenRecipe((o) => ({ ...o, favorite: !o.favorite }));
    if (updated) saveRecipe(updated);
  };

  const deleteRecipe = (id) => {
    setRecipes((prev) => prev.filter((r) => r.id !== id));
    setOpenRecipe(null);
    removeRecipe(id);
    flash("Recipe deleted");
  };

  const rootBackground = T.bgImage
    ? { backgroundImage: "url(" + T.bgImage + ")", backgroundSize: "cover", backgroundPosition: "center", backgroundAttachment: "fixed", backgroundColor: T.bg }
    : { background: T.bg };

  return (
    <ThemeCtx.Provider value={T}>
      <div
        style={{
          minHeight: "100vh",
          ...rootBackground,
          color: T.ink,
          fontFamily: "'Avenir Next','Segoe UI',system-ui,sans-serif",
          position: "relative",
        }}
      >
        {T.overlayTint && (
          <div style={{ position: "fixed", inset: 0, background: T.overlayTint, pointerEvents: "none", zIndex: 0 }} aria-hidden="true" />
        )}

        <div style={{ position: "relative", zIndex: 1 }}>
          {view === "home" && (
            <Home go={setView} count={recipes.length} favCount={recipes.filter((r) => r.favorite).length} />
          )}

          {view === "recipes" && (
            <RecipeList
              title="Recipes"
              recipes={recipes}
              tab={tab}
              setTab={setTab}
              onOpen={setOpenRecipe}
              onStar={toggleFavorite}
              onAdd={() => setShowForm(true)}
              goHome={() => setView("home")}
              goFavorites={() => setView("favorites")}
              goSettings={() => setView("settings")}
              showTabs
            />
          )}

          {view === "favorites" && (
            <RecipeList
              title="Favorites"
              recipes={recipes.filter((r) => r.favorite)}
              onOpen={setOpenRecipe}
              onStar={toggleFavorite}
              onAdd={() => setShowForm(true)}
              goHome={() => setView("home")}
              goRecipes={() => setView("recipes")}
              goSettings={() => setView("settings")}
            />
          )}

          {view === "settings" && (
            <SettingsPage settings={settings} onChange={updateSettings} goHome={() => setView("home")} />
          )}

          {showForm && <RecipeForm onCancel={() => setShowForm(false)} onSave={addRecipe} />}

          {openRecipe && (
            <RecipeDetail
              recipe={recipes.find((r) => r.id === openRecipe.id) || openRecipe}
              onClose={() => setOpenRecipe(null)}
              onStar={() => toggleFavorite(openRecipe.id)}
              onDelete={() => deleteRecipe(openRecipe.id)}
            />
          )}

          {notice && (
            <div
              style={{
                position: "fixed", bottom: 84, left: "50%", transform: "translateX(-50%)",
                background: T.ink, color: T.card, padding: "10px 20px", borderRadius: 999,
                fontSize: 14, zIndex: 90, boxShadow: "0 4px 14px rgba(0,0,0,.25)", maxWidth: "88vw",
              }}
            >
              {notice}
            </div>
          )}
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

/* ---------- title screen ---------- */
function Home({ go, count, favCount }) {
  const T = useTheme();
  return (
    <div
      style={{
        minHeight: "100vh", display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", padding: 24, textAlign: "center",
        position: "relative",
      }}
    >
      <div style={{ position: "fixed", top: 16, right: 16, color: T.ink, zIndex: 30 }}>
        <GearButton onClick={() => go("settings")} />
      </div>

      <div style={{ fontSize: 13, letterSpacing: "0.25em", textTransform: "uppercase", color: T.inkSoft, marginBottom: 10 }}>
        Your personal recipe box
      </div>
      <h1 className="display" style={{ fontSize: "clamp(40px, 8vw, 72px)", fontWeight: 700, margin: "0 0 40px", lineHeight: 1.05 }}>
        Recipe Storage
      </h1>

      <button
        onClick={() => go("recipes")}
        className="card-hover"
        aria-label="Open recipes"
        style={{
          width: 190, height: 190, borderRadius: "50%",
          background: T.card, border: "2px solid " + T.ink,
          boxShadow: "0 0 0 10px transparent, 0 0 0 12px " + T.line + ", 0 10px 26px rgba(0,0,0,.2)",
          cursor: "pointer", display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", gap: 6,
        }}
      >
        <span className="display" style={{ fontSize: 26, fontWeight: 700, color: T.ink }}>Recipes</span>
        <span style={{ fontSize: 12, color: T.inkSoft }}>{count} saved</span>
      </button>

      <div style={{ marginTop: 44, display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
        <button
          onClick={() => go("favorites")}
          style={{
            display: "inline-flex", alignItems: "center", gap: 8,
            background: T.card, border: "1.5px solid " + T.line, borderRadius: 999,
            padding: "10px 22px", fontSize: 15, fontWeight: 600, color: T.ink, cursor: "pointer",
          }}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2.5l2.9 6.1 6.6.9-4.8 4.7 1.2 6.6L12 17.7l-5.9 3.1 1.2-6.6L2.5 9.5l6.6-.9L12 2.5z" fill={T.star} stroke={T.starEdge} strokeWidth="1.4" />
          </svg>
          Favorites {favCount > 0 ? "(" + favCount + ")" : ""}
        </button>
        <button
          onClick={() => go("settings")}
          style={{
            display: "inline-flex", alignItems: "center", gap: 8,
            background: T.card, border: "1.5px solid " + T.line, borderRadius: 999,
            padding: "10px 22px", fontSize: 15, fontWeight: 600, color: T.ink, cursor: "pointer",
          }}
        >
          ⚙ Settings
        </button>
      </div>
    </div>
  );
}

/* ---------- list pages (Recipes / Favorites) ---------- */
function RecipeList({ title, recipes, tab, setTab, onOpen, onStar, onAdd, goHome, goFavorites, goRecipes, goSettings, showTabs }) {
  const T = useTheme();
  const visible = showTabs
    ? recipes.filter((r) => r.type === tab || !r.type) // unclassified recipes appear in every tab
    : recipes;

  const topLinkStyle = {
    background: "rgba(255,255,255,.12)", border: "1px solid rgba(255,255,255,.3)",
    color: "#FFFDF8", borderRadius: 999, padding: "7px 14px",
    fontSize: 13, fontWeight: 600, cursor: "pointer",
  };
  const headerBg = luminance(T.bg) < 0.45 ? mix(T.bg, "#000000", 0.3) : T.ink;

  return (
    <div style={{ minHeight: "100vh", paddingBottom: 110 }}>
      <header
        style={{
          position: "sticky", top: 0, zIndex: 30,
          background: headerBg, color: "#FFFDF8",
          padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between",
        }}
      >
        <h2 className="display" style={{ margin: 0, fontSize: 24, fontWeight: 700 }}>{title}</h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {goFavorites && <button onClick={goFavorites} style={topLinkStyle}>★ Favorites</button>}
          {goRecipes && <button onClick={goRecipes} style={topLinkStyle}>All recipes</button>}
          <GearButton onClick={goSettings} />
        </div>
      </header>

      {showTabs && (
        <nav style={{ display: "flex", gap: 8, padding: "14px 20px 0", maxWidth: 980, margin: "0 auto" }} aria-label="Meal type">
          {MEALS.map((m) => {
            const active = tab === m;
            return (
              <button
                key={m}
                onClick={() => setTab(m)}
                style={{
                  flex: 1, padding: "10px 0 9px", borderRadius: "10px 10px 0 0",
                  border: "1.5px solid " + (active ? T.ink : T.line),
                  borderBottom: active ? "3px solid " + T.tabColors[m] : "1.5px solid " + T.line,
                  background: active ? T.card : "transparent",
                  color: active ? T.ink : T.inkSoft,
                  fontWeight: active ? 700 : 500, fontSize: 15, cursor: "pointer",
                }}
                aria-pressed={active}
              >
                {m}
              </button>
            );
          })}
        </nav>
      )}

      <main style={{ maxWidth: 980, margin: "0 auto", padding: "22px 20px" }}>
        {visible.length === 0 ? (
          <div style={{ textAlign: "center", marginTop: 70, color: T.inkSoft }}>
            <p className="display" style={{ fontSize: 22, color: T.ink, marginBottom: 8 }}>
              {title === "Favorites" ? "No favorites yet" : "No " + (showTabs ? tab.toLowerCase() + " " : "") + "recipes yet"}
            </p>
            <p style={{ margin: 0 }}>
              {title === "Favorites"
                ? "Tap the star on any recipe to keep it here."
                : "Use the + button to add your first recipe."}
            </p>
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 18 }}>
            {visible.map((r) => (
              <RecipeCard key={r.id} r={r} onOpen={() => onOpen(r)} onStar={() => onStar(r.id)} />
            ))}
          </div>
        )}
      </main>

      <BackButton onClick={goHome} />

      <button
        onClick={onAdd}
        aria-label="Add recipe"
        className="card-hover"
        style={{
          position: "fixed", right: 20, bottom: 20, zIndex: 40,

/* ---------- add-recipe form (Write my own / Search recipes) ---------- */
function RecipeForm({ onCancel, onSave }) {
  const T = useTheme();
  const [formTab, setFormTab] = useState("create");
  const [name, setName] = useState("");
  const [type, setType] = useState("");
  const [ingredients, setIngredients] = useState("");
  const [steps, setSteps] = useState("");
  const [image, setImage] = useState(null);
  const [imgBusy, setImgBusy] = useState(false);
  const [error, setError] = useState("");
  const [prefillNote, setPrefillNote] = useState("");
  const fileRef = useRef(null);

  const [query, setQuery] = useState("");
  const [searching, setSearching] = useState(false);
  const [results, setResults] = useState(null);
  const [searchError, setSearchError] = useState("");
  const [searchNote, setSearchNote] = useState("");

  const inputStyle = {
    width: "100%", boxSizing: "border-box", padding: "11px 13px", borderRadius: 10,
    border: "1.5px solid " + T.line, background: luminance(T.card) < 0.45 ? mix(T.card, "#000000", 0.2) : "#fff",
    fontSize: 15, color: T.ink, fontFamily: "inherit",
  };

  const handleImage = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setImgBusy(true);
    setError("");
    try {
      const dataUrl = await fileToCompressedDataUrl(file);
      setImage(dataUrl);
    } catch (err) {
      setError("That image couldn't be read. Try a different file.");
    }
    setImgBusy(false);
  };

  const runSearch = async () => {
    const q = query.trim();
    if (!q) { setSearchError("Type a dish or ingredient to search for."); return; }
    setSearching(true);
    setSearchError("");
    setSearchNote("");
    setResults(null);

    // 1. Bundled database (works offline, instant)
    const db = await getLocalDb();
    const localHits = searchLocalDb(db, q);

    // 2. TheMealDB — free public recipe API, no account needed
    const webHits = await searchMealDb(q);

    const combined = [...localHits];
    if (webHits && webHits.length) {
      const seen = new Set(combined.map((r) => r.name.toLowerCase()));
      for (const r of webHits) {
        if (!seen.has(r.name.toLowerCase())) {
          combined.push(r);
          seen.add(r.name.toLowerCase());
        }
      }
    }

    if (webHits === null && localHits.length === 0) {
      setSearchError("Couldn't reach the online recipe database and nothing matched in the built-in one. Check your connection or reword the search.");
    } else if (combined.length === 0) {
      setSearchError("No recipes found for \u201C" + q + "\u201D. Try a simpler term — e.g. \u201Cchicken\u201D instead of a full dish name.");
    } else {
      if (webHits === null) setSearchNote("Online database unreachable — showing built-in matches only.");
      setResults(combined.slice(0, 8));
    }
    setSearching(false);
  };

  const useResult = (r) => {
    setName(r.name);
    setType(r.type || "");
    setIngredients((r.ingredients || []).join("\n"));
    setSteps((r.steps || []).join("\n"));
    setImage(r.image || null);
    setError("");
    setPrefillNote("Loaded \u201C" + r.name + "\u201D from " + (r.source === "TheMealDB" ? "TheMealDB" : "the built-in collection") + " — review, tweak, then save.");
    setFormTab("create");
  };

  const submit = () => {
    if (!name.trim()) { setError("Give the recipe a name to save it."); return; }
    const ing = ingredients.split("\n").map((s) => s.trim()).filter(Boolean);
    const stp = steps.split("\n").map((s) => s.trim()).filter(Boolean);
    if (ing.length === 0) { setError("Add at least one ingredient (one per line)."); return; }
    if (stp.length === 0) { setError("Add at least one step (one per line)."); return; }
    onSave({
      id: uid(), name: name.trim(), type: type || "",
      ingredients: ing, steps: stp, image, favorite: false, createdAt: Date.now(),
    });
  };

  const formTabBtn = (id, label) => {
    const active = formTab === id;
    return (
      <button
        onClick={() => setFormTab(id)}
        aria-pressed={active}
        style={{
          flex: 1, padding: "10px 0", borderRadius: 10,
          border: active ? "2px solid " + T.accent : "1.5px solid " + T.line,
          background: active ? T.accent : "transparent",
          color: active ? T.onAccent : T.inkSoft,
          fontWeight: 700, fontSize: 14.5, cursor: "pointer",
        }}
      >
        {label}
      </button>
    );
  };

  return (
    <Overlay onClose={onCancel}>
      <h3 className="display" style={{ margin: "0 0 14px", fontSize: 26 }}>Add a recipe</h3>

      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {formTabBtn("create", "✎ Write my own")}
        {formTabBtn("search", "🔍 Search recipes")}
      </div>

      {formTab === "search" ? (
        <div>
          <Field label="What are you looking for?" hint="A dish or ingredient — searches the built-in collection plus TheMealDB, a free online recipe database.">
            <div style={{ display: "flex", gap: 8 }}>
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && !searching && runSearch()}
                placeholder="e.g. chicken parmesan"
                style={{ ...inputStyle, flex: 1 }}
              />
              <button
                onClick={runSearch}
                disabled={searching}
                style={{
                  padding: "11px 20px", borderRadius: 10, border: "none",
                  background: T.accent, color: T.onAccent, fontWeight: 700, fontSize: 14.5,
                  cursor: searching ? "wait" : "pointer", whiteSpace: "nowrap",
                }}
              >
                {searching ? "Searching…" : "Search"}
              </button>
            </div>
          </Field>

          {searchError && <p style={{ color: T.accent, fontSize: 14, margin: "0 0 12px" }}>{searchError}</p>}
          {searchNote && <p style={{ color: T.inkSoft, fontSize: 13, margin: "0 0 12px" }}>{searchNote}</p>}

          {searching && (
            <p style={{ color: T.inkSoft, fontSize: 14.5, textAlign: "center", margin: "24px 0" }}>
              Looking up recipes for “{query.trim()}”…
            </p>
          )}

          {results && results.length > 0 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {results.map((r, i) => (
                <div
                  key={i}
                  style={{
                    border: "1.5px solid " + T.line, borderRadius: 12, padding: "12px 14px",
                    display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12,
                  }}
                >
                  {r.image && (
                    <img src={r.image} alt="" style={{ width: 56, height: 56, objectFit: "cover", borderRadius: 8, flexShrink: 0 }} />
                  )}
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div className="display" style={{ fontSize: 17, fontWeight: 700 }}>{r.name}</div>
                    {r.description && <div style={{ fontSize: 13.5, color: T.inkSoft, marginTop: 3 }}>{r.description}</div>}
                    <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 4 }}>
                      {(r.type || "Any meal") + " · " + (r.ingredients ? r.ingredients.length : 0) + " ingredients · " + r.source}
                    </div>
                  </div>
                  <button
                    onClick={() => useResult(r)}
                    style={{
                      flexShrink: 0, padding: "9px 16px", borderRadius: 999,
                      border: "1.5px solid " + T.accent, background: "transparent",
                      color: T.accent, fontWeight: 700, fontSize: 13.5, cursor: "pointer",
                    }}
                  >
                    Use this →
                  </button>
                </div>
              ))}
              <p style={{ fontSize: 12.5, color: T.inkSoft, margin: "4px 0 0" }}>
                Picking one loads it into "Write my own" so you can review and edit before saving.
              </p>
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 20 }}>
            <button onClick={onCancel} style={{ ...smallBtnStyle(T), padding: "12px 22px" }}>Cancel</button>
          </div>
        </div>
      ) : (
        <div>
          {prefillNote && (
            <p style={{ background: mix(T.card, T.accent, 0.12), border: "1.5px solid " + T.accent, borderRadius: 10, padding: "10px 14px", fontSize: 13.5, margin: "0 0 16px" }}>
              {prefillNote}
            </p>
          )}

          <Field label="Recipe name *">
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Sunday pancakes" style={inputStyle} />
          </Field>

          <Field label="Type" hint="Optional — pick a meal to file it under a tab. Left blank, it shows in all tabs.">
            <select value={type} onChange={(e) => setType(e.target.value)} style={inputStyle}>
              <option value="">No type — show everywhere</option>
              {MEALS.map((m) => <option key={m} value={m}>{m}</option>)}
            </select>
          </Field>

          <Field label="Ingredients *" hint="One ingredient per line.">
            <textarea
              value={ingredients}
              onChange={(e) => setIngredients(e.target.value)}
              rows={5}
              placeholder={"2 cups flour\n1 tbsp sugar\n2 eggs"}
              style={{ ...inputStyle, resize: "vertical" }}
            />
          </Field>

          <Field label="Steps *" hint="One step per line — they'll be numbered automatically.">
            <textarea
              value={steps}
              onChange={(e) => setSteps(e.target.value)}
              rows={5}
              placeholder={"Whisk the dry ingredients\nFold in the eggs and milk\nCook 2-3 min per side"}
              style={{ ...inputStyle, resize: "vertical" }}
            />
          </Field>

          <Field label="Photo" hint="Optional — show what the finished dish should look like.">
            <input ref={fileRef} type="file" accept="image/*" onChange={handleImage} style={{ display: "none" }} />
            {image ? (
              <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                <img src={image} alt="Recipe preview" style={{ width: 110, height: 80, objectFit: "cover", borderRadius: 8, border: "1.5px solid " + T.line }} />
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <button onClick={() => fileRef.current && fileRef.current.click()} style={smallBtnStyle(T)}>Replace photo</button>
                  <button onClick={() => setImage(null)} style={{ ...smallBtnStyle(T), color: T.accent, borderColor: T.accent }}>Remove photo</button>
                </div>
              </div>
            ) : (
              <button onClick={() => fileRef.current && fileRef.current.click()} disabled={imgBusy} style={{ ...smallBtnStyle(T), padding: "12px 18px" }}>
                {imgBusy ? "Processing…" : "＋ Add a photo"}
              </button>
            )}
          </Field>

          {error && <p style={{ color: T.accent, fontSize: 14, margin: "4px 0 0" }}>{error}</p>}

          <div style={{ display: "flex", gap: 10, marginTop: 22, justifyContent: "flex-end" }}>
            <button onClick={onCancel} style={{ ...smallBtnStyle(T), padding: "12px 22px" }}>Cancel</button>
            <button
              onClick={submit}
              style={{
                padding: "12px 26px", borderRadius: 999, border: "none",
                background: T.accent, color: T.onAccent, fontSize: 15, fontWeight: 700, cursor: "pointer",
              }}
            >
              Save recipe
            </button>
          </div>
        </div>
      )}
    </Overlay>
  );
}

/* ---------- shared bits ---------- */
function Overlay({ children, onClose }) {
  const T = useTheme();
  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", zIndex: 60,
        display: "flex", alignItems: "flex-start", justifyContent: "center",
        padding: "5vh 16px 16px", overflowY: "auto",
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        role="dialog"
        aria-modal="true"
        style={{
          background: T.card, color: T.ink, borderRadius: 16, border: "1.5px solid " + T.line,
          padding: "26px 26px 24px", width: "100%", maxWidth: 560,
          boxShadow: "0 16px 44px rgba(0,0,0,.35)",
        }}
      >
        {children}
      </div>
    </div>
  );
}

function Field({ label, hint, children }) {
  const T = useTheme();
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: "block", fontSize: 14, fontWeight: 700, marginBottom: 5 }}>{label}</label>
      {children}
      {hint && <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 5 }}>{hint}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RecipeStorage />);
</script>
</body>
</html>
