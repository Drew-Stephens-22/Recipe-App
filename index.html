<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recipe Storage</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  .display { font-family: 'Fraunces', Georgia, serif; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  .card-hover { transition: transform .15s ease, box-shadow .15s ease; }
  .card-hover:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.22); }
  .tab-scroll { scrollbar-width: thin; }
  .tab-scroll::-webkit-scrollbar { height: 5px; }
  .tab-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,.22); border-radius: 999px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, createContext, useContext } = React;

/* ------------------------------------------------------------------ */
/*  Recipe Storage — GitHub Pages edition                              */
/*  100% free: recipes persist in the browser's localStorage, and the  */
/*  search tab uses the bundled recipes-db.json plus TheMealDB (a      */
/*  free, no-account recipe API). No AI usage anywhere.                */
/* ------------------------------------------------------------------ */

const MEALS = ["Breakfast", "Lunch", "Dinner", "Snack", "Dessert"];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* ---------- localStorage persistence ---------- */
const store = {
  listKeys(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) keys.push(k);
    }
    return keys;
  },
  get(key) {
    return localStorage.getItem(key);
  },
  set(key, value) {
    try { localStorage.setItem(key, value); return true; }
    catch (e) { return false; } // quota exceeded
  },
  remove(key) {
    localStorage.removeItem(key);
  },
};

function loadRecipes() {
  const out = [];
  for (const k of store.listKeys("recipe:")) {
    try {
      const v = store.get(k);
      if (v) out.push(JSON.parse(v));
    } catch (e) { /* skip broken entry */ }
  }
  out.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  return out;
}
function saveRecipe(recipe) {
  return store.set("recipe:" + recipe.id, JSON.stringify(recipe));
}
function removeRecipe(id) {
  store.remove("recipe:" + id);
}
function loadSettings() {
  try {
    const v = store.get("app-settings");
    return v ? JSON.parse(v) : null;
  } catch (e) { return null; }
}
function saveSettings(s) {
  return store.set("app-settings", JSON.stringify(s));
}
/* favorites/hidden flags for the built-in recipes (the recipes themselves
   live in recipes-db.json, so we only persist the user's choices about them) */
function loadBuiltinMeta() {
  try {
    const v = store.get("builtin-meta");
    return v ? JSON.parse(v) : { favs: [], hidden: [] };
  } catch (e) { return { favs: [], hidden: [] }; }
}
function saveBuiltinMeta(meta) {
  return store.set("builtin-meta", JSON.stringify(meta));
}

/* ---------- color math for themes ---------- */
function hexToRgb(hex) {
  const h = hex.replace("#", "");
  const v = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
  return [parseInt(v.slice(0, 2), 16), parseInt(v.slice(2, 4), 16), parseInt(v.slice(4, 6), 16)];
}
function rgbToHex(rgb) {
  return "#" + rgb.map((v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0")).join("");
}
function luminance(hex) {
  const [r, g, b] = hexToRgb(hex).map((v) => v / 255);
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}
function mix(hexA, hexB, t) {
  const a = hexToRgb(hexA), b = hexToRgb(hexB);
  return rgbToHex(a.map((v, i) => v + (b[i] - v) * t));
}

/* ---------- theme definitions ---------- */
const LIGHT = {
  bg: "#EEF1EA", ink: "#26382B", inkSoft: "#5A6B5D", card: "#FFFDF8",
  line: "#D8DDD2", accent: "#C4452C", star: "#E9B44C", starEdge: "#B8860B",
  tabColors: { Breakfast: "#E9B44C", Lunch: "#7E9271", Dinner: "#C4452C", Snack: "#5E86A8", Dessert: "#A2648F" },
  onAccent: "#FFFFFF", overlayTint: null, bgImage: null,
};
const DARK = {
  bg: "#1C221D", ink: "#F1EFE5", inkSoft: "#A7B2A5", card: "#2A332B",
  line: "#3E483F", accent: "#E06248", star: "#E9B44C", starEdge: "#E9B44C",
  tabColors: { Breakfast: "#E9B44C", Lunch: "#8FA382", Dinner: "#E06248", Snack: "#7FA3C4", Dessert: "#C08AB0" },
  onAccent: "#FFFFFF", overlayTint: null, bgImage: null,
};
function buildCustomTheme(base, accent, bgImage) {
  const darkBase = luminance(base) < 0.45;
  const ink = darkBase ? mix(base, "#FFFFFF", 0.92) : mix(base, "#000000", 0.82);
  const card = darkBase ? mix(base, "#FFFFFF", 0.09) : mix(base, "#FFFFFF", 0.65);
  const accentIsLight = luminance(accent) > 0.6;
  return {
    bg: base, ink,
    inkSoft: mix(ink, base, 0.35),
    card,
    line: mix(base, ink, 0.22),
    accent, star: accent, starEdge: mix(accent, ink, 0.35),
    tabColors: {
      Breakfast: mix(accent, base, 0.25),
      Lunch: mix(accent, base, 0.4),
      Dinner: accent,
      Snack: mix(accent, base, 0.55),
      Dessert: mix(accent, ink, 0.25),
    },
    onAccent: accentIsLight ? "#1A1A1A" : "#FFFFFF",
    overlayTint: bgImage ? (darkBase ? "rgba(0,0,0,.45)" : "rgba(255,255,255,.55)") : null,
    bgImage: bgImage || null,
  };
}

const ThemeCtx = createContext(LIGHT);
const useTheme = () => useContext(ThemeCtx);

/* ---------- image compression (keeps localStorage small) ---------- */
function fileToCompressedDataUrl(file, maxDim = 900, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("read failed"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("image decode failed"));
      img.onload = () => {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------- free recipe search: bundled DB + TheMealDB ---------- */
let localDbCache = null;
async function getLocalDb() {
  if (localDbCache) return localDbCache;
  try {
    const res = await fetch("recipes-db.json");
    const data = await res.json();
    localDbCache = Array.isArray(data) ? data : [];
  } catch (e) {
    localDbCache = [];
  }
  return localDbCache;
}

function searchLocalDb(db, q) {
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  return db
    .map((r) => {
      const hay = (r.name + " " + (r.description || "") + " " + (r.ingredients || []).join(" ")).toLowerCase();
      const nameHay = r.name.toLowerCase();
      let score = 0;
      for (const t of terms) {
        if (nameHay.includes(t)) score += 3;
        else if (hay.includes(t)) score += 1;
      }
      return { r, score };
    })
    .filter((x) => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5)
    .map((x) => ({ ...x.r, source: "Built-in" }));
}

function mealDbToRecipe(meal) {
  const ingredients = [];
  for (let i = 1; i <= 20; i++) {
    const ing = meal["strIngredient" + i];
    const measure = meal["strMeasure" + i];
    if (ing && ing.trim()) {
      ingredients.push(((measure || "").trim() + " " + ing.trim()).trim());
    }
  }
  const steps = (meal.strInstructions || "")
    .split(/\r?\n+/)
    .map((s) => s.replace(/^STEP \d+[:.]?\s*/i, "").replace(/^\d+[.)]\s*/, "").trim())
    .filter((s) => s.length > 3);
  const cat = (meal.strCategory || "").toLowerCase();
  const type = cat === "breakfast" ? "Breakfast" : cat === "dessert" ? "Dessert" : "";
  const descBits = [meal.strArea, meal.strCategory].filter(Boolean);
  return {
    name: meal.strMeal,
    type,
    description: descBits.length ? descBits.join(" · ") : "",
    ingredients,
    steps: steps.length ? steps : [meal.strInstructions || ""].filter(Boolean),
    image: meal.strMealThumb ? meal.strMealThumb + "/preview" : null,
    source: "TheMealDB",
  };
}

async function searchMealDb(q) {
  try {
    const res = await fetch("https://www.themealdb.com/api/json/v1/1/search.php?s=" + encodeURIComponent(q));
    const data = await res.json();
    if (!data.meals) return [];
    return data.meals.slice(0, 6).map(mealDbToRecipe);
  } catch (e) {
    return null; // network failure — distinguish from "no results"
  }
}

/* ---------- photo-to-recipe: free in-browser OCR (Tesseract.js) ---------- */
function loadTesseract() {
  return new Promise((resolve, reject) => {
    if (window.Tesseract) return resolve(window.Tesseract);
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload = () => resolve(window.Tesseract);
    s.onerror = () => reject(new Error("Couldn't load the text-recognition library. Check your connection."));
    document.head.appendChild(s);
  });
}

/* Split OCR text into a best-guess name / ingredients / steps.
   Heuristics: section headers win; otherwise lines that start with or
   contain quantities look like ingredients, prose looks like steps. */
function parseRecipeText(raw) {
  const lines = raw.split(/\r?\n/).map((s) => s.trim()).filter((s) => s.length > 1);
  const unitRe = /(\d|½|¼|¾|⅓|⅔|⅛)\s*(cups?|tbsps?|tablespoons?|tsps?|teaspoons?|oz\b|ounces?|grams?|g\b|kg\b|ml\b|liters?|l\b|lbs?\b|pounds?|pinch(es)?|cloves?|cans?|sticks?|slices?|pieces?|large|medium|small)/i;
  const qtyStart = /^[\d½¼¾⅓⅔⅛]/;
  const headerOf = (line) => {
    const low = line.toLowerCase().replace(/[^a-z]/g, "");
    if (/^ingredients?$/.test(low)) return "ing";
    if (/^(instructions?|directions?|method|steps?|preparation|howtomake)$/.test(low)) return "steps";
    return null;
  };

  let name = "";
  const ing = [], steps = [];
  let section = null;

  for (const line of lines) {
    const h = headerOf(line);
    if (h) { section = h; continue; }
    if (!name && !section && line.length < 60 && !qtyStart.test(line)) { name = line; continue; }
    if (section === "ing") { ing.push(line.replace(/^[-•*·]\s*/, "")); continue; }
    if (section === "steps") { steps.push(line.replace(/^\d+[.)]\s*/, "")); continue; }
    // no headers found — classify by shape
    if (qtyStart.test(line) || unitRe.test(line)) ing.push(line.replace(/^[-•*·]\s*/, ""));
    else steps.push(line.replace(/^\d+[.)]\s*/, ""));
  }
  return { name, ingredients: ing, steps };
}

/* ---------- tiny UI atoms ---------- */
function Star({ filled, onClick, size = 22 }) {
  const T = useTheme();
  return (
    <button
      onClick={(e) => { e.stopPropagation(); onClick(); }}
      aria-label={filled ? "Remove from favorites" : "Add to favorites"}
      style={{ background: "none", border: "none", cursor: "pointer", padding: 4, lineHeight: 0 }}
    >
      <svg width={size} height={size} viewBox="0 0 24 24">
        <path
          d="M12 2.5l2.9 6.1 6.6.9-4.8 4.7 1.2 6.6L12 17.7l-5.9 3.1 1.2-6.6L2.5 9.5l6.6-.9L12 2.5z"
          fill={filled ? T.star : "none"}
          stroke={filled ? T.starEdge : T.inkSoft}
          strokeWidth="1.6"
          strokeLinejoin="round"
        />
      </svg>
    </button>
  );
}

function BackButton({ onClick, label = "Back" }) {
  const T = useTheme();
  return (
    <button
      onClick={onClick}
      style={{
        position: "fixed", left: 20, bottom: 20, zIndex: 40,
        display: "flex", alignItems: "center", gap: 8,
        padding: "10px 18px 10px 14px", borderRadius: 999,
        border: "1.5px solid " + T.ink, background: T.card, color: T.ink,
        fontSize: 14, fontWeight: 600, cursor: "pointer",
        boxShadow: "0 2px 8px rgba(0,0,0,0.2)",
      }}
    >
      <span aria-hidden="true" style={{ fontSize: 16 }}>←</span> {label}
    </button>
  );
}

function GearButton({ onClick }) {
  return (
    <button
      onClick={onClick}
      aria-label="Settings"
      title="Settings"
      style={{ background: "none", border: "none", cursor: "pointer", padding: 6, lineHeight: 0, color: "inherit" }}
    >
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="3.2" />
        <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.56-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.01A1.7 1.7 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56h.01a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.01A1.7 1.7 0 0 0 20.91 10H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1z" />
      </svg>
    </button>
  );
}

function ShareButton({ onClick }) {
  return (
    <button
      onClick={onClick}
      aria-label="Import and export recipes"
      title="Import / Export"
      style={{ background: "none", border: "none", cursor: "pointer", padding: 6, lineHeight: 0, color: "inherit" }}
    >
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
        <path d="M7 3v13" />
        <path d="M3.5 12.5L7 16l3.5-3.5" />
        <path d="M17 21V8" />
        <path d="M13.5 11.5L17 8l3.5 3.5" />
      </svg>
    </button>
  );
}

const smallBtnStyle = (T) => ({
  padding: "9px 16px", borderRadius: 999, border: "1.5px solid " + T.line,
  background: T.card, color: T.ink, fontSize: 14, fontWeight: 600, cursor: "pointer",
});

/* ---------- main app ---------- */
function RecipeStorage() {
  const [view, setView] = useState("home"); // home | recipes | favorites | settings
  const [tab, setTab] = useState("Breakfast");
  const [recipes, setRecipes] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [editRecipe, setEditRecipe] = useState(null);
  const [openRecipe, setOpenRecipe] = useState(null);
  const [notice, setNotice] = useState("");
  const [settings, setSettings] = useState({
    theme: "light",
    customBase: "#EEF1EA",
    customAccent: "#C4452C",
    customBgImage: null,
  });

  useEffect(() => {
    setRecipes(loadRecipes());
    const s = loadSettings();
    if (s) setSettings((prev) => ({ ...prev, ...s }));

    // Load the built-in collection so every visitor starts with recipes.
    getLocalDb().then((db) => {
      const meta = loadBuiltinMeta();
      const builtins = db
        .map((r, i) => ({
          id: "builtin-" + i,
          name: r.name,
          type: MEALS.includes(r.type) ? r.type : "",
          description: r.description || "",
          ingredients: r.ingredients || [],
          steps: r.steps || [],
          image: r.image || null,
          favorite: meta.favs.indexOf("builtin-" + i) !== -1,
          builtin: true,
          createdAt: 0, // built-ins sort after the user's own recipes
        }))
        .filter((r) => meta.hidden.indexOf(r.id) === -1);
      setRecipes((prev) => [...prev.filter((r) => !r.builtin), ...builtins]);
    });
  }, []);

  const T =
    settings.theme === "dark" ? DARK :
    settings.theme === "custom" ? buildCustomTheme(settings.customBase, settings.customAccent, settings.customBgImage) :
    LIGHT;

  const flash = (msg) => {
    setNotice(msg);
    setTimeout(() => setNotice(""), 2600);
  };

  const importRecipes = (list) => {
    const existing = new Set(recipes.map((r) => r.name.toLowerCase()));
    const added = [];
    let skipped = 0, invalid = 0, unsaved = 0;
    for (const r of list) {
      if (!r || !r.name || !Array.isArray(r.ingredients) || !Array.isArray(r.steps) || r.ingredients.length === 0 || r.steps.length === 0) {
        invalid++;
        continue;
      }
      if (existing.has(String(r.name).toLowerCase())) { skipped++; continue; }
      const rec = {
        id: uid(),
        name: String(r.name),
        type: MEALS.includes(r.type) ? r.type : "",
        description: r.description ? String(r.description) : "",
        ingredients: r.ingredients.map(String),
        steps: r.steps.map(String),
        image: typeof r.image === "string" ? r.image : null,
        favorite: false,
        createdAt: Date.now(),
      };
      existing.add(rec.name.toLowerCase());
      if (!saveRecipe(rec)) unsaved++;
      added.push(rec);
    }
    if (added.length) setRecipes((prev) => [...added, ...prev]);
    return { added: added.length, skipped, invalid, unsaved };
  };

  const updateSettings = (patch) => {
    const next = { ...settings, ...patch };
    setSettings(next);
    if (!saveSettings(next)) flash("Theme applied, but couldn't be saved — browser storage is full.");
  };

  const addRecipe = (payload) => {
    const recipe = { id: uid(), favorite: false, createdAt: Date.now(), ...payload };
    setRecipes((prev) => [recipe, ...prev]);
    setShowForm(false);
    const ok = saveRecipe(recipe);
    flash(ok ? "Saved \u201C" + recipe.name + "\u201D" : "Added, but couldn't be saved — browser storage is full. Try removing the photo.");
  };

  const applyEdit = (original, payload) => {
    setEditRecipe(null);
    if (original.builtin) {
      // Built-ins live in recipes-db.json, so an edit becomes the user's own
      // copy and the original built-in is hidden for them.
      const rec = { id: uid(), favorite: original.favorite, createdAt: Date.now(), ...payload };
      const meta = loadBuiltinMeta();
      if (meta.hidden.indexOf(original.id) === -1) meta.hidden.push(original.id);
      meta.favs = meta.favs.filter((f) => f !== original.id);
      saveBuiltinMeta(meta);
      setRecipes((prev) => [rec, ...prev.filter((r) => r.id !== original.id)]);
      const ok = saveRecipe(rec);
      flash(ok ? "Saved your edited copy of \u201C" + rec.name + "\u201D" : "Edited, but couldn't be saved — browser storage is full.");
    } else {
      const rec = { ...original, ...payload };
      setRecipes((prev) => prev.map((r) => (r.id === original.id ? rec : r)));
      const ok = saveRecipe(rec);
      flash(ok ? "Changes saved" : "Changed, but couldn't be saved — browser storage is full.");
    }
  };

  const toggleFavorite = (id) => {
    let updated;
    setRecipes((prev) =>
      prev.map((r) => {
        if (r.id !== id) return r;
        updated = { ...r, favorite: !r.favorite };
        return updated;
      })
    );
    if (openRecipe && openRecipe.id === id) setOpenRecipe((o) => ({ ...o, favorite: !o.favorite }));
    if (updated) {
      if (updated.builtin) {
        const meta = loadBuiltinMeta();
        meta.favs = updated.favorite
          ? Array.from(new Set([...meta.favs, id]))
          : meta.favs.filter((f) => f !== id);
        saveBuiltinMeta(meta);
      } else {
        saveRecipe(updated);
      }
    }
  };

  const deleteRecipe = (id) => {
    setRecipes((prev) => prev.filter((r) => r.id !== id));
    setOpenRecipe(null);
    if (id.indexOf("builtin-") === 0) {
      // built-ins live in recipes-db.json, so "deleting" hides it for this user
      const meta = loadBuiltinMeta();
      if (meta.hidden.indexOf(id) === -1) meta.hidden.push(id);
      meta.favs = meta.favs.filter((f) => f !== id);
      saveBuiltinMeta(meta);
      flash("Built-in recipe hidden from your app");
    } else {
      removeRecipe(id);
      flash("Recipe deleted");
    }
  };

  const rootBackground = T.bgImage
    ? { backgroundImage: "url(" + T.bgImage + ")", backgroundSize: "cover", backgroundPosition: "center", backgroundAttachment: "fixed", backgroundColor: T.bg }
    : { background: T.bg };

  return (
    <ThemeCtx.Provider value={T}>
      <div
        style={{
          minHeight: "100vh",
          ...rootBackground,
          color: T.ink,
          fontFamily: "'Avenir Next','Segoe UI',system-ui,sans-serif",
          position: "relative",
        }}
      >
        {T.overlayTint && (
          <div style={{ position: "fixed", inset: 0, background: T.overlayTint, pointerEvents: "none", zIndex: 0 }} aria-hidden="true" />
        )}

        <div style={{ position: "relative", zIndex: 1 }}>
          {view === "home" && (
            <Home go={setView} count={recipes.length} favCount={recipes.filter((r) => r.favorite).length} />
          )}

          {view === "recipes" && (
            <RecipeList
              title="Recipes"
              recipes={recipes}
              tab={tab}
              setTab={setTab}
              onOpen={setOpenRecipe}
              onStar={toggleFavorite}
              onAdd={() => setShowForm(true)}
              goHome={() => setView("home")}
              goFavorites={() => setView("favorites")}
              goSettings={() => setView("settings")}
              goShare={() => setView("share")}
              showTabs
            />
          )}

          {view === "favorites" && (
            <RecipeList
              title="Favorites"
              recipes={recipes.filter((r) => r.favorite)}
              onOpen={setOpenRecipe}
              onStar={toggleFavorite}
              onAdd={() => setShowForm(true)}
              goHome={() => setView("home")}
              goRecipes={() => setView("recipes")}
              goSettings={() => setView("settings")}
              goShare={() => setView("share")}
            />
          )}

          {view === "settings" && (
            <SettingsPage settings={settings} onChange={updateSettings} goHome={() => setView("home")} goShare={() => setView("share")} />
          )}

          {view === "share" && (
            <ImportExportPage recipes={recipes} onImport={importRecipes} goHome={() => setView("home")} goSettings={() => setView("settings")} />
          )}

          {(showForm || editRecipe) && (
            <RecipeForm
              initial={editRecipe}
              defaultType={showForm && view === "recipes" ? tab : ""}
              onCancel={() => { setShowForm(false); setEditRecipe(null); }}
              onSave={(payload) => (editRecipe ? applyEdit(editRecipe, payload) : addRecipe(payload))}
            />
          )}

          {openRecipe && (
            <RecipeDetail
              recipe={recipes.find((r) => r.id === openRecipe.id) || openRecipe}
              onClose={() => setOpenRecipe(null)}
              onStar={() => toggleFavorite(openRecipe.id)}
              onDelete={() => deleteRecipe(openRecipe.id)}
              onEdit={() => {
                const current = recipes.find((r) => r.id === openRecipe.id) || openRecipe;
                setOpenRecipe(null);
                setEditRecipe(current);
              }}
            />
          )}

          {notice && (
            <div
              style={{
                position: "fixed", bottom: 84, left: "50%", transform: "translateX(-50%)",
                background: T.ink, color: T.card, padding: "10px 20px", borderRadius: 999,
                fontSize: 14, zIndex: 90, boxShadow: "0 4px 14px rgba(0,0,0,.25)", maxWidth: "88vw",
              }}
            >
              {notice}
            </div>
          )}
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

/* ---------- import / export page ---------- */
function ImportExportPage({ recipes, onImport, goHome, goSettings }) {
  const T = useTheme();
  const importRef = useRef(null);
  const [importMsg, setImportMsg] = useState("");
  const [sel, setSel] = useState(() => new Set());
  const [filter, setFilter] = useState("");
  const [exportMsg, setExportMsg] = useState("");

  const headerBg = luminance(T.bg) < 0.45 ? mix(T.bg, "#000000", 0.3) : T.ink;

  // De-duplicate the visible list by name (first occurrence wins — the
  // user's own copy sorts before built-ins, so edits take priority).
  const seen = new Set();
  const unique = recipes.filter((r) => {
    const k = r.name.trim().toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });

  const q = filter.trim().toLowerCase();
  const shown = q ? unique.filter((r) => r.name.toLowerCase().includes(q)) : unique;

  const toggle = (id) => {
    setSel((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };
  const selectShown = () => setSel((prev) => new Set([...prev, ...shown.map((r) => r.id)]));
  const clearAll = () => setSel(new Set());

  const doExport = () => {
    const chosen = unique
      .filter((r) => sel.has(r.id))
      .map((r) => ({
        name: r.name,
        type: r.type || "",
        description: r.description || "",
        ingredients: r.ingredients || [],
        steps: r.steps || [],
        image: r.image || null,
      }));
    if (chosen.length === 0) return;
    const blob = new Blob([JSON.stringify(chosen, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "my-recipes.json";
    a.click();
    URL.revokeObjectURL(a.href);
    setExportMsg("Downloaded " + chosen.length + " recipe" + (chosen.length === 1 ? "" : "s") + " as my-recipes.json.");
  };

  const handleImportFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setImportMsg("");
    try {
      const text = await file.text();
      let parsed = JSON.parse(text);
      if (!Array.isArray(parsed)) parsed = [parsed];
      const res = onImport(parsed);
      const bits = [];
      bits.push(res.added + " recipe" + (res.added === 1 ? "" : "s") + " imported");
      if (res.skipped) bits.push(res.skipped + " skipped — already in your app");
      if (res.invalid) bits.push(res.invalid + " entries weren't valid recipes");
      if (res.unsaved) bits.push(res.unsaved + " couldn't be saved permanently — browser storage may be full");
      setImportMsg(bits.join(" · ") + ".");
    } catch (err) {
      setImportMsg("That file couldn't be read as a recipe list. It should be a .json file exported from this app.");
    }
    if (importRef.current) importRef.current.value = "";
  };

  const sectionHead = {
    fontSize: 13, fontWeight: 800, letterSpacing: "0.12em", textTransform: "uppercase",
    color: T.inkSoft, margin: "0 0 10px",
  };

  return (
    <div style={{ minHeight: "100vh", paddingBottom: 110 }}>
      <header style={{ position: "sticky", top: 0, zIndex: 30, background: headerBg, color: "#FFFDF8", padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <h2 className="display" style={{ margin: 0, fontSize: 24, fontWeight: 700 }}>Import &amp; Export</h2>
        <GearButton onClick={goSettings} />
      </header>

      <main style={{ maxWidth: 640, margin: "0 auto", padding: "26px 20px" }}>
        {/* ---- import ---- */}
        <h3 style={sectionHead}>Import</h3>
        <div style={{ background: T.card, border: "1.5px solid " + T.line, borderRadius: 14, padding: "16px 18px", marginBottom: 30 }}>
          <p style={{ fontSize: 14, color: T.inkSoft, margin: "0 0 12px", lineHeight: 1.55 }}>
            Load a <code style={{ fontSize: 13 }}>.json</code> file exported from this app. Recipes you already
            have (matched by name) are skipped automatically — no duplicates.
          </p>
          <input ref={importRef} type="file" accept=".json,application/json" onChange={handleImportFile} style={{ display: "none" }} />
          <button
            onClick={() => importRef.current && importRef.current.click()}
            style={{ padding: "11px 22px", borderRadius: 999, border: "none", background: T.accent, color: T.onAccent, fontSize: 14.5, fontWeight: 700, cursor: "pointer" }}
          >
            ⇧ Choose a file to import
          </button>
          {importMsg && <p style={{ fontSize: 13.5, marginTop: 12, marginBottom: 0 }}>{importMsg}</p>}
        </div>

        {/* ---- export ---- */}
        <h3 style={sectionHead}>Export</h3>
        <div style={{ background: T.card, border: "1.5px solid " + T.line, borderRadius: 14, padding: "16px 18px" }}>
          <p style={{ fontSize: 14, color: T.inkSoft, margin: "0 0 12px", lineHeight: 1.55 }}>
            Pick as many recipes as you like — share the file with anyone using this app, or keep it
            as a backup in case your browser storage is ever cleared.
          </p>

          <input
            value={filter}
            onChange={(e) => setFilter(e.target.value)}
            placeholder="Filter by name…"
            aria-label="Filter recipes to export"
            style={{
              width: "100%", boxSizing: "border-box", padding: "9px 13px", borderRadius: 999,
              border: "1.5px solid " + T.line,
              background: luminance(T.card) < 0.45 ? mix(T.card, "#000000", 0.15) : "#fff",
              fontSize: 14, color: T.ink, fontFamily: "inherit", marginBottom: 10,
            }}
          />

          <div style={{ display: "flex", gap: 8, marginBottom: 10, alignItems: "center", flexWrap: "wrap" }}>
            <button onClick={selectShown} style={{ ...smallBtnStyle(T), padding: "6px 14px", fontSize: 13 }}>
              Select {q ? "shown" : "all"}
            </button>
            <button onClick={clearAll} style={{ ...smallBtnStyle(T), padding: "6px 14px", fontSize: 13 }}>Clear</button>
            <span style={{ fontSize: 13, color: T.inkSoft }}>{sel.size} of {unique.length} selected</span>
          </div>

          <div style={{ maxHeight: "44vh", overflowY: "auto", border: "1.5px solid " + T.line, borderRadius: 12 }}>
            {shown.length === 0 ? (
              <p style={{ padding: 16, margin: 0, fontSize: 14, color: T.inkSoft }}>
                {unique.length === 0 ? "No recipes in the app yet." : "No recipes match that filter."}
              </p>
            ) : (
              shown.map((r) => (
                <label
                  key={r.id}
                  style={{
                    display: "flex", alignItems: "center", gap: 10, padding: "10px 14px",
                    borderBottom: "1px solid " + T.line, cursor: "pointer", fontSize: 14.5,
                  }}
                >
                  <input type="checkbox" checked={sel.has(r.id)} onChange={() => toggle(r.id)} style={{ width: 17, height: 17, accentColor: T.accent, flexShrink: 0 }} />
                  <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.name}</span>
                  <span style={{ fontSize: 12, color: T.inkSoft, flexShrink: 0 }}>
                    {(r.type || "Any") + (r.builtin ? " · Built-in" : "")}
                  </span>
                </label>
              ))
            )}
          </div>

          <div style={{ display: "flex", gap: 10, marginTop: 14, alignItems: "center", flexWrap: "wrap" }}>
            <button
              onClick={doExport}
              disabled={sel.size === 0}
              style={{
                padding: "11px 24px", borderRadius: 999, border: "none",
                background: sel.size === 0 ? T.line : T.accent,
                color: sel.size === 0 ? T.inkSoft : T.onAccent,
                fontSize: 14.5, fontWeight: 700, cursor: sel.size === 0 ? "not-allowed" : "pointer",
              }}
            >
              ⇩ Export {sel.size > 0 ? sel.size + " recipe" + (sel.size === 1 ? "" : "s") : ""}
            </button>
            {exportMsg && <span style={{ fontSize: 13.5, color: T.inkSoft }}>{exportMsg}</span>}
          </div>
        </div>
      </main>

      <BackButton onClick={goHome} />
    </div>
  );
}

/* ---------- add-recipe form (Write my own / Search recipes) ---------- */
function RecipeForm({ onCancel, onSave, initial, defaultType }) {
  const T = useTheme();
  const editing = !!initial;
  const [formTab, setFormTab] = useState("create");
  const [name, setName] = useState(initial ? initial.name : "");
  const [type, setType] = useState(initial ? (initial.type || "") : (defaultType || ""));
  const [ingredients, setIngredients] = useState(initial ? (initial.ingredients || []).join("\n") : "");
  const [steps, setSteps] = useState(initial ? (initial.steps || []).join("\n") : "");
  const [image, setImage] = useState(initial ? (initial.image || null) : null);
  const [imgBusy, setImgBusy] = useState(false);
  const [error, setError] = useState("");
  const [prefillNote, setPrefillNote] = useState("");
  const fileRef = useRef(null);

  const [query, setQuery] = useState("");
  const [searching, setSearching] = useState(false);
  const [results, setResults] = useState(null);
  const [searchError, setSearchError] = useState("");
  const [searchNote, setSearchNote] = useState("");

  // scan-a-photo (OCR) state
  const scanFileRef = useRef(null);
  const [scanning, setScanning] = useState(false);
  const [scanProgress, setScanProgress] = useState(0);
  const [scanError, setScanError] = useState("");

  const handleScan = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setScanning(true);
    setScanProgress(0);
    setScanError("");
    try {
      const Tess = await loadTesseract();
      const { data } = await Tess.recognize(file, "eng", {
        logger: (m) => {
          if (m.status === "recognizing text") setScanProgress(Math.round(m.progress * 100));
        },
      });
      const text = (data && data.text) ? data.text.trim() : "";
      if (!text) {
        setScanError("No readable text found in that image. Try a clearer, closer photo of the recipe text.");
      } else {
        const parsed = parseRecipeText(text);
        setName(parsed.name || "");
        setIngredients(parsed.ingredients.join("\n"));
        setSteps(parsed.steps.join("\n"));
        setImage(null);
        setError("");
        setPrefillNote("Text pulled from your photo — OCR isn't perfect, so double-check the fields, fix anything garbled, pick a type, then save.");
        setFormTab("create");
      }
    } catch (err) {
      setScanError(err && err.message ? err.message : "Couldn't read that image. Try another photo.");
    }
    setScanning(false);
    if (scanFileRef.current) scanFileRef.current.value = "";
  };

  const inputStyle = {
    width: "100%", boxSizing: "border-box", padding: "11px 13px", borderRadius: 10,
    border: "1.5px solid " + T.line, background: luminance(T.card) < 0.45 ? mix(T.card, "#000000", 0.2) : "#fff",
    fontSize: 15, color: T.ink, fontFamily: "inherit",
  };

  const handleImage = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setImgBusy(true);
    setError("");
    try {
      const dataUrl = await fileToCompressedDataUrl(file);
      setImage(dataUrl);
    } catch (err) {
      setError("That image couldn't be read. Try a different file.");
    }
    setImgBusy(false);
  };

  const runSearch = async () => {
    const q = query.trim();
    if (!q) { setSearchError("Type a dish or ingredient to search for."); return; }
    setSearching(true);
    setSearchError("");
    setSearchNote("");
    setResults(null);

    // 1. Bundled database (works offline, instant)
    const db = await getLocalDb();
    const localHits = searchLocalDb(db, q);

    // 2. TheMealDB — free public recipe API, no account needed
    const webHits = await searchMealDb(q);

    const combined = [...localHits];
    if (webHits && webHits.length) {
      const seen = new Set(combined.map((r) => r.name.toLowerCase()));
      for (const r of webHits) {
        if (!seen.has(r.name.toLowerCase())) {
          combined.push(r);
          seen.add(r.name.toLowerCase());
        }
      }
    }

    if (webHits === null && localHits.length === 0) {
      setSearchError("Couldn't reach the online recipe database and nothing matched in the built-in one. Check your connection or reword the search.");
    } else if (combined.length === 0) {
      setSearchError("No recipes found for \u201C" + q + "\u201D. Try a simpler term — e.g. \u201Cchicken\u201D instead of a full dish name.");
    } else {
      if (webHits === null) setSearchNote("Online database unreachable — showing built-in matches only.");
      setResults(combined.slice(0, 8));
    }
    setSearching(false);
  };

  const useResult = (r) => {
    setName(r.name);
    setType(r.type || "");
    setIngredients((r.ingredients || []).join("\n"));
    setSteps((r.steps || []).join("\n"));
    setImage(r.image || null);
    setError("");
    setPrefillNote("Loaded \u201C" + r.name + "\u201D from " + (r.source === "TheMealDB" ? "TheMealDB" : "the built-in collection") + " — review, tweak, then save.");
    setFormTab("create");
  };

  const submit = () => {
    if (!name.trim()) { setError("Give the recipe a name to save it."); return; }
    const ing = ingredients.split("\n").map((s) => s.trim()).filter(Boolean);
    const stp = steps.split("\n").map((s) => s.trim()).filter(Boolean);
    if (ing.length === 0) { setError("Add at least one ingredient (one per line)."); return; }
    if (stp.length === 0) { setError("Add at least one step (one per line)."); return; }
    onSave({ name: name.trim(), type: type || "", ingredients: ing, steps: stp, image });
  };

  const formTabBtn = (id, label) => {
    const active = formTab === id;
    return (
      <button
        onClick={() => setFormTab(id)}
        aria-pressed={active}
        style={{
          flex: 1, padding: "10px 0", borderRadius: 10,
          border: active ? "2px solid " + T.accent : "1.5px solid " + T.line,
          background: active ? T.accent : "transparent",
          color: active ? T.onAccent : T.inkSoft,
          fontWeight: 700, fontSize: 14.5, cursor: "pointer",
        }}
      >
        {label}
      </button>
    );
  };

  return (
    <Overlay onClose={onCancel}>
      <h3 className="display" style={{ margin: "0 0 14px", fontSize: 26 }}>{editing ? "Edit recipe" : "Add a recipe"}</h3>

      {!editing && (
        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          {formTabBtn("create", "✎ Write my own")}
          {formTabBtn("search", "🔍 Search")}
          {formTabBtn("scan", "📷 Scan a photo")}
        </div>
      )}

      {formTab === "scan" ? (
        <div>
          <p style={{ fontSize: 14.5, lineHeight: 1.6, color: T.inkSoft, margin: "0 0 16px" }}>
            Have a recipe as a picture — a screenshot from Instagram, a photo of a cookbook page or recipe card?
            Upload it and the app will read the text right in your browser (nothing is uploaded to any server)
            and fill out the recipe form for you to review.
          </p>
          <input ref={scanFileRef} type="file" accept="image/*" onChange={handleScan} style={{ display: "none" }} />
          <button
            onClick={() => scanFileRef.current && scanFileRef.current.click()}
            disabled={scanning}
            style={{
              width: "100%", padding: "22px 16px", borderRadius: 12,
              border: "2px dashed " + T.line, background: "transparent",
              color: T.ink, fontSize: 15.5, fontWeight: 600,
              cursor: scanning ? "wait" : "pointer",
            }}
          >
            {scanning
              ? (scanProgress > 0 ? "Reading text… " + scanProgress + "%" : "Preparing the reader…")
              : "＋ Choose a recipe photo"}
          </button>
          {scanning && (
            <div style={{ marginTop: 10, height: 6, borderRadius: 999, background: T.line, overflow: "hidden" }}>
              <div style={{ height: "100%", width: scanProgress + "%", background: T.accent, transition: "width .3s ease" }} />
            </div>
          )}
          {scanError && <p style={{ color: T.accent, fontSize: 14, margin: "12px 0 0" }}>{scanError}</p>}
          <p style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 14 }}>
            Works best on clear, printed text photographed straight-on. Handwriting and heavily stylized
            fonts may come out garbled — you can fix anything in the form before saving. The first scan
            downloads the free reader (a few MB), so it takes a moment; after that it's faster.
          </p>
          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 20 }}>
            <button onClick={onCancel} style={{ ...smallBtnStyle(T), padding: "12px 22px" }}>Cancel</button>
          </div>
        </div>
      ) : formTab === "search" ? (
        <div>
          <Field label="What are you looking for?" hint="A dish or ingredient — searches the built-in collection plus TheMealDB, a free online recipe database.">
            <div style={{ display: "flex", gap: 8 }}>
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && !searching && runSearch()}
                placeholder="e.g. chicken parmesan"
                style={{ ...inputStyle, flex: 1 }}
              />
              <button
                onClick={runSearch}
                disabled={searching}
                style={{
                  padding: "11px 20px", borderRadius: 10, border: "none",
                  background: T.accent, color: T.onAccent, fontWeight: 700, fontSize: 14.5,
                  cursor: searching ? "wait" : "pointer", whiteSpace: "nowrap",
                }}
              >
                {searching ? "Searching…" : "Search"}
              </button>
            </div>
          </Field>

          {searchError && <p style={{ color: T.accent, fontSize: 14, margin: "0 0 12px" }}>{searchError}</p>}
          {searchNote && <p style={{ color: T.inkSoft, fontSize: 13, margin: "0 0 12px" }}>{searchNote}</p>}

          {searching && (
            <p style={{ color: T.inkSoft, fontSize: 14.5, textAlign: "center", margin: "24px 0" }}>
              Looking up recipes for “{query.trim()}”…
            </p>
          )}

          {results && results.length > 0 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {results.map((r, i) => (
                <div
                  key={i}
                  style={{
                    border: "1.5px solid " + T.line, borderRadius: 12, padding: "12px 14px",
                    display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12,
                  }}
                >
                  {r.image && (
                    <img src={r.image} alt="" style={{ width: 56, height: 56, objectFit: "cover", borderRadius: 8, flexShrink: 0 }} />
                  )}
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div className="display" style={{ fontSize: 17, fontWeight: 700 }}>{r.name}</div>
                    {r.description && <div style={{ fontSize: 13.5, color: T.inkSoft, marginTop: 3 }}>{r.description}</div>}
                    <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 4 }}>
                      {(r.type || "Any meal") + " · " + (r.ingredients ? r.ingredients.length : 0) + " ingredients · " + r.source}
                    </div>
                  </div>
                  <button
                    onClick={() => useResult(r)}
                    style={{
                      flexShrink: 0, padding: "9px 16px", borderRadius: 999,
                      border: "1.5px solid " + T.accent, background: "transparent",
                      color: T.accent, fontWeight: 700, fontSize: 13.5, cursor: "pointer",
                    }}
                  >
                    Use this →
                  </button>
                </div>
              ))}
              <p style={{ fontSize: 12.5, color: T.inkSoft, margin: "4px 0 0" }}>
                Picking one loads it into "Write my own" so you can review and edit before saving.
              </p>
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 20 }}>
            <button onClick={onCancel} style={{ ...smallBtnStyle(T), padding: "12px 22px" }}>Cancel</button>
          </div>
        </div>
      ) : (
        <div>
          {prefillNote && (
            <p style={{ background: mix(T.card, T.accent, 0.12), border: "1.5px solid " + T.accent, borderRadius: 10, padding: "10px 14px", fontSize: 13.5, margin: "0 0 16px" }}>
              {prefillNote}
            </p>
          )}

          <Field label="Recipe name *">
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Sunday pancakes" style={inputStyle} />
          </Field>

          <Field label="Type" hint={!editing && defaultType ? "Auto-filled from the \u201C" + defaultType + "\u201D tab you were on — change it if this belongs elsewhere." : "Optional — pick a meal to file it under a tab. Left blank, it shows in all tabs."}>
            <select value={type} onChange={(e) => setType(e.target.value)} style={inputStyle}>
              <option value="">No type — show everywhere</option>
              {MEALS.map((m) => <option key={m} value={m}>{m}</option>)}
            </select>
          </Field>

          <Field label="Ingredients *" hint="One ingredient per line.">
            <textarea
              value={ingredients}
              onChange={(e) => setIngredients(e.target.value)}
              rows={5}
              placeholder={"2 cups flour\n1 tbsp sugar\n2 eggs"}
              style={{ ...inputStyle, resize: "vertical" }}
            />
          </Field>

          <Field label="Steps *" hint="One step per line — they'll be numbered automatically.">
            <textarea
              value={steps}
              onChange={(e) => setSteps(e.target.value)}
              rows={5}
              placeholder={"Whisk the dry ingredients\nFold in the eggs and milk\nCook 2-3 min per side"}
              style={{ ...inputStyle, resize: "vertical" }}
            />
          </Field>

          <Field label="Photo" hint="Optional — show what the finished dish should look like.">
            <input ref={fileRef} type="file" accept="image/*" onChange={handleImage} style={{ display: "none" }} />
            {image ? (
              <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                <img src={image} alt="Recipe preview" style={{ width: 110, height: 80, objectFit: "cover", borderRadius: 8, border: "1.5px solid " + T.line }} />
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <button onClick={() => fileRef.current && fileRef.current.click()} style={smallBtnStyle(T)}>Replace photo</button>
                  <button onClick={() => setImage(null)} style={{ ...smallBtnStyle(T), color: T.accent, borderColor: T.accent }}>Remove photo</button>
                </div>
              </div>
            ) : (
              <button onClick={() => fileRef.current && fileRef.current.click()} disabled={imgBusy} style={{ ...smallBtnStyle(T), padding: "12px 18px" }}>
                {imgBusy ? "Processing…" : "＋ Add a photo"}
              </button>
            )}
          </Field>

          {error && <p style={{ color: T.accent, fontSize: 14, margin: "4px 0 0" }}>{error}</p>}

          <div style={{ display: "flex", gap: 10, marginTop: 22, justifyContent: "flex-end" }}>
            <button onClick={onCancel} style={{ ...smallBtnStyle(T), padding: "12px 22px" }}>Cancel</button>
            <button
              onClick={submit}
              style={{
                padding: "12px 26px", borderRadius: 999, border: "none",
                background: T.accent, color: T.onAccent, fontSize: 15, fontWeight: 700, cursor: "pointer",
              }}
            >
              {editing ? "Save changes" : "Save recipe"}
            </button>
          </div>
        </div>
      )}
    </Overlay>
  );
}

/* ---------- recipe detail ---------- */
function RecipeDetail({ recipe, onClose, onStar, onDelete, onEdit }) {
  const T = useTheme();
  const [confirming, setConfirming] = useState(false);

  const sectionHead = {
    fontSize: 13, fontWeight: 800, letterSpacing: "0.12em", textTransform: "uppercase",
    color: T.inkSoft, margin: "24px 0 8px", borderBottom: "1.5px solid " + T.line, paddingBottom: 6,
  };

  return (
    <Overlay onClose={onClose}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: T.inkSoft }}>
            {(recipe.type || "Any meal") + (recipe.builtin ? " · Built-in" : "")}
          </div>
          <h3 className="display" style={{ margin: "4px 0 0", fontSize: 28, lineHeight: 1.15 }}>{recipe.name}</h3>
        </div>
        <Star filled={!!recipe.favorite} onClick={onStar} size={28} />
      </div>

      {recipe.image && (
        <img
          src={recipe.image}
          alt={recipe.name + " — finished dish"}
          style={{ width: "100%", maxHeight: 300, objectFit: "cover", borderRadius: 12, margin: "16px 0 4px", border: "1.5px solid " + T.line }}
        />
      )}

      <h4 style={sectionHead}>Ingredients</h4>
      <ul style={{ margin: 0, paddingLeft: 22, lineHeight: 1.8, fontSize: 15.5 }}>
        {(recipe.ingredients || []).map((ing, i) => <li key={i}>{ing}</li>)}
      </ul>

      <h4 style={sectionHead}>Steps</h4>
      <ol style={{ margin: 0, paddingLeft: 24, lineHeight: 1.8, fontSize: 15.5 }}>
        {(recipe.steps || []).map((s, i) => <li key={i} style={{ marginBottom: 6 }}>{s}</li>)}
      </ol>

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 26, gap: 10, flexWrap: "wrap" }}>
        {confirming ? (
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <span style={{ fontSize: 14, color: T.inkSoft }}>{recipe.builtin ? "Hide this built-in recipe?" : "Delete this recipe?"}</span>
            <button onClick={onDelete} style={{ ...smallBtnStyle(T), background: T.accent, color: T.onAccent, borderColor: T.accent }}>
              {recipe.builtin ? "Yes, hide it" : "Yes, delete"}
            </button>
            <button onClick={() => setConfirming(false)} style={smallBtnStyle(T)}>Keep it</button>
          </div>
        ) : (
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button onClick={onEdit} style={smallBtnStyle(T)}>✎ Edit recipe</button>
            <button onClick={() => setConfirming(true)} style={{ ...smallBtnStyle(T), color: T.accent, borderColor: T.accent }}>
              {recipe.builtin ? "Hide recipe" : "Delete recipe"}
            </button>
          </div>
        )}
        <button onClick={onClose} style={{ ...smallBtnStyle(T), background: T.ink, color: T.bg, borderColor: T.ink, padding: "10px 24px" }}>Close</button>
      </div>
    </Overlay>
  );
}

/* ---------- shared bits ---------- */
function Overlay({ children, onClose }) {
  const T = useTheme();
  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", zIndex: 60,
        display: "flex", alignItems: "flex-start", justifyContent: "center",
        padding: "5vh 16px 16px", overflowY: "auto",
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        role="dialog"
        aria-modal="true"
        style={{
          background: T.card, color: T.ink, borderRadius: 16, border: "1.5px solid " + T.line,
          padding: "26px 26px 24px", width: "100%", maxWidth: 560,
          boxShadow: "0 16px 44px rgba(0,0,0,.35)",
        }}
      >
        {children}
      </div>
    </div>
  );
}

function Field({ label, hint, children }) {
  const T = useTheme();
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: "block", fontSize: 14, fontWeight: 700, marginBottom: 5 }}>{label}</label>
      {children}
      {hint && <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 5 }}>{hint}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RecipeStorage />);
</script>
</body>
</html>
